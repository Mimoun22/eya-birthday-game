// Slideshow
const SLIDE_IMAGES = ['slideshow/photo1.jpg','slideshow/photo2.jpg','slideshow/photo3.jpg'];
let slideIndex = 0;
let slideTimer = null;
const preloadedImages = [];

function preloadSlideImages() {
  for (const src of SLIDE_IMAGES) {
    const img = new Image();
    img.src = src;
    preloadedImages.push(img);
  }
}

function showSlide(index) {
  const img = document.getElementById('slideImage');
  const counter = document.getElementById('slide-counter');
  const noMsg = document.getElementById('no-slides-msg');
  const nav = document.getElementById('slide-nav');
  let hasValid = false;
  for (let i = 0; i < preloadedImages.length; i++) {
    if (preloadedImages[i].complete && preloadedImages[i].naturalWidth > 0) { hasValid = true; break; }
  }
  if (!hasValid) {
    img.style.display = 'none';
    noMsg.style.display = 'flex';
    nav.style.display = 'none';
    return;
  }
  noMsg.style.display = 'none';
  nav.style.display = 'flex';
  if (preloadedImages[index] && preloadedImages[index].complete && preloadedImages[index].naturalWidth > 0) {
    img.src = preloadedImages[index].src;
    counter.textContent = `${index + 1} / ${SLIDE_IMAGES.length}`;
  } else {
    slideIndex = (index + 1) % SLIDE_IMAGES.length;
    showSlide(slideIndex);
  }
}

function nextSlide() {
  slideIndex = (slideIndex + 1) % SLIDE_IMAGES.length;
  showSlide(slideIndex);
  resetSlideTimer();
}
function prevSlide() {
  slideIndex = (slideIndex - 1 + SLIDE_IMAGES.length) % SLIDE_IMAGES.length;
  showSlide(slideIndex);
  resetSlideTimer();
}
function resetSlideTimer() {
  if (slideTimer) clearInterval(slideTimer);
  slideTimer = setInterval(nextSlide, 3000);
}

function showFinalOverlay() {
  document.getElementById('finalOverlay').classList.add('show');
  document.getElementById('couponContainer').style.display = 'flex';
  document.getElementById('photosContainer').style.display = 'none';
  slideIndex = 0;
  for (let i = 0; i < preloadedImages.length; i++) {
    if (preloadedImages[i].complete && preloadedImages[i].naturalWidth > 0) { slideIndex = i; break; }
  }
  showSlide(slideIndex);
  resetSlideTimer();
}

// Audio
function initAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playSFX(type) {
  if (!audioCtx) return;
  if (sfxVolume <= 0) return;
  const vol = sfxVolume;
  const now = audioCtx.currentTime;

  if (type === 'jump') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(350, now);
    osc.frequency.linearRampToValueAtTime(700, now + 0.1);
    gain.gain.setValueAtTime(vol * 0.12, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.15);
    osc.start(now);
    osc.stop(now + 0.15);
  } else if (type === 'collect') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, now);
    osc.frequency.setValueAtTime(659, now + 0.07);
    gain.gain.setValueAtTime(vol * 0.12, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.18);
    osc.start(now);
    osc.stop(now + 0.18);
  } else if (type === 'broken') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.linearRampToValueAtTime(100, now + 0.2);
    gain.gain.setValueAtTime(vol * 0.06, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.2);
    osc.start(now);
    osc.stop(now + 0.2);
  } else if (type === 'complete') {
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      const t = now + i * 0.1;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(vol * 0.12, t);
      gain.gain.linearRampToValueAtTime(0, t + 0.15);
      osc.start(t);
      osc.stop(t + 0.15);
    });
  } else if (type === 'meow') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(500, now);
    osc.frequency.linearRampToValueAtTime(900, now + 0.08);
    osc.frequency.linearRampToValueAtTime(650, now + 0.12);
    osc.frequency.linearRampToValueAtTime(750, now + 0.18);
    gain.gain.setValueAtTime(vol * 0.1, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.25);
    osc.start(now);
    osc.stop(now + 0.25);
  }
}

  if (audioUnlocked) return;

  initAudioCtx();
  const audio = document.getElementById('bgm');
  if (audio) {

    audio.volume = musicVolume;
    audio.play().catch(() => {});
    musicOn = true;

function toggleMusic() {
  const audio = document.getElementById('bgm');
  if (!audio) return;
  if (musicOn) {
    audio.muted = true;
    audio.pause();
    musicOn = false;
  } else {
    audio.muted = false;
    audio.volume = musicVolume;
    audio.play().catch(() => {});
    musicOn = true;
  }
}

    audio.muted = true;

        musicOn = true;

// Save / load progress
function saveProgress() {
  try {
    const val = Math.max(unlockedLevel, parseInt(localStorage.getItem('eya_unlocked') || '0', 10));
    unlockedLevel = val;
  } catch (e) { /* ignore */ }
}

function loadProgress() {
  try {
    const val = parseInt(localStorage.getItem('eya_unlocked') || '0', 10);
    unlockedLevel = Math.max(0, Math.min(val, levels.length - 1));
  } catch (e) { unlockedLevel = 0; }
}

function advanceProgress(completedLevel) {
  const next = completedLevel + 1;
  if (next > unlockedLevel && next < levels.length) {
    unlockedLevel = next;
    try { localStorage.setItem('eya_unlocked', String(unlockedLevel)); } catch (e) { /* ignore */ }
  }
}

// Level management

  const lv = levels[index];

    w: 28, h: 32,
    vx: 0, vy: 0,
    onGround: false,
    facing: 1,
  };
  platforms = lv.platforms.map(p => ({ ...p }));
  hearts = lv.hearts.map(h => ({ ...h, collected: false }));
  brokenHearts = lv.broken.map(b => ({ ...b, active: true }));
  cake = { ...lv.cake };
  heartsCollected = 0;
  levelCompleted = false;
  confetti = [];
  heartParticles = [];
  pawPrints = [];
  gameState = STATE.PLAYING;
}

// Drawing helpers
function drawHeart(x, y, size, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = color || '#e91e63';
  ctx.beginPath();
  ctx.moveTo(0, size * 0.3);
  ctx.bezierCurveTo(-size * 0.5, -size * 0.3, -size, size * 0.1, 0, size);
  ctx.bezierCurveTo(size, size * 0.1, size * 0.5, -size * 0.3, 0, size * 0.3);
  ctx.fill();
  ctx.restore();
}

function drawBrokenHeart(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = '#9e9e9e';
  ctx.strokeStyle = '#757575';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, size * 0.3);
  ctx.bezierCurveTo(-size * 0.5, -size * 0.3, -size, size * 0.1, 0, size);
  ctx.bezierCurveTo(size, size * 0.1, size * 0.5, -size * 0.3, 0, size * 0.3);
  ctx.fill();
  ctx.stroke();
  ctx.strokeStyle = '#616161';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-3, size * 0.1);
  ctx.lineTo(0, size * 0.4);
  ctx.lineTo(-2, size * 0.6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(3, size * 0.15);
  ctx.lineTo(1, size * 0.35);
  ctx.stroke();
  ctx.strokeStyle = '#616161';
  ctx.lineWidth = 1.5;
  const es = size * 0.2;
  [-es, es].forEach(ex => {
    ctx.beginPath();
    ctx.moveTo(ex - 2, -size * 0.15);
    ctx.lineTo(ex + 2, -size * 0.05);
    ctx.moveTo(ex + 2, -size * 0.15);
    ctx.lineTo(ex - 2, -size * 0.05);
    ctx.stroke();
  });
  ctx.restore();
}

function drawCake(x, y) {

function drawPawPrint(x, y, size, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(233,30,99,0.12)';
  ctx.beginPath();
  ctx.ellipse(x, y, size * 0.5, size * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.arc(x + i * size * 0.28, y - size * 0.42, size * 0.14, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(x, y - size * 0.54, size * 0.14, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawCat(x, y, w, h, facing, moving) {
  ctx.save();
  ctx.translate(x + w / 2, y + h / 2);
  const legAnim = moving ? Math.sin(Date.now() / 120) : 0;
  ctx.fillStyle = '#fff5f5';
  ctx.strokeStyle = '#f8bbd0';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(0, 4, w * 0.4, h * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, -8, w * 0.38, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#fff5f5';
  for (let s of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(s * 14, -14);
    ctx.lineTo(s * 18, -26);
    ctx.lineTo(s * 6, -18);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
  ctx.fillStyle = '#fce4ec';
  ctx.beginPath();
  ctx.moveTo(-13, -16); ctx.lineTo(-15, -24); ctx.lineTo(-7, -18); ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(13, -16); ctx.lineTo(15, -24); ctx.lineTo(7, -18); ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#e91e63';
  ctx.beginPath();
  ctx.moveTo(-8, -17); ctx.lineTo(-4, -14); ctx.lineTo(-8, -11); ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(8, -17); ctx.lineTo(4, -14); ctx.lineTo(8, -11); ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#f06292';
  ctx.beginPath();
  ctx.arc(0, -14, 2.5, 0, Math.PI * 2);
  ctx.fill();
  const blink = Math.sin(Date.now() / 3000) > 0.85 ? 0 : 4;
  ctx.fillStyle = '#4a2c2c';
  ctx.beginPath();
  ctx.ellipse(-5, -9, 3, blink * 0.7 + 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(5, -9, 3, blink * 0.7 + 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  if (blink > 0) {
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(-4, -10, 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(6, -10, 1.2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#f48fb1';
  ctx.beginPath();
  ctx.moveTo(0, -5); ctx.lineTo(-2, -3); ctx.lineTo(2, -3); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#f48fb1';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(-2, -2, 2, Math.PI * 0.2, Math.PI * 0.8);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(2, -2, 2, Math.PI * 1.2, Math.PI * 1.8);
  ctx.stroke();
  ctx.strokeStyle = '#f8bbd0';
  ctx.lineWidth = 0.8;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(-7 + i, -6 + i * 2);
    ctx.lineTo(-16 + i, -8 + i * 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(7 + i, -6 + i * 2);
    ctx.lineTo(16 + i, -8 + i * 3);
    ctx.stroke();
  }
  ctx.strokeStyle = '#fff5f5';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  const tailWag = Math.sin(Date.now() / 200) * 0.4;
  ctx.beginPath();
  ctx.moveTo(-facing * 14, 6);
  ctx.quadraticCurveTo(-facing * 24, -4 + tailWag * 8, -facing * 18, -12 + tailWag * 8);
  ctx.stroke();
  for (let s of [-1, 1]) {
    ctx.fillStyle = '#fff5f5';
    ctx.strokeStyle = '#f8bbd0';
    ctx.lineWidth = 1;
    const off = legAnim * s * 2;
    ctx.fillRect(s * 5 - 3, 8 + off, 6, 5);
    ctx.strokeRect(s * 5 - 3, 8 + off, 6, 5);
  }
  ctx.restore();
}

function rectCollision(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function circleCollision(px, py, pr, bx, by, bw, bh) {
  const cx = Math.max(bx, Math.min(px, bx + bw));
  const cy = Math.max(by, Math.min(py, by + bh));
  const dx = px - cx, dy = py - cy;
  return dx * dx + dy * dy < pr * pr;
}

// Level Select
function drawLevelSelect() {
  drawBackground();
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.shadowColor = 'rgba(233,30,99,0.15)';
  ctx.shadowBlur = 12;
  ctx.font = 'bold 30px "Segoe UI", sans-serif';
  ctx.fillStyle = '#e91e63';
  ctx.fillText('Select Level', W / 2, 50);
  ctx.shadowBlur = 0;

  const startY = 110;
  const gap = 85;

  ctx.buttons = [];
  for (let i = 0; i < levels.length; i++) {
    const lv = levels[i];
    const by = startY + i * gap;
    const bx = 130, bw = 540, bh = 70;
    const locked = i > unlockedLevel;
    const hover = !locked && mouseX >= bx && mouseX <= bx + bw && mouseY >= by && mouseY <= by + bh;

    // Card background
    ctx.fillStyle = locked ? '#f5f5f5' : (hover ? '#fff5f7' : '#fff');
    ctx.shadowColor = 'rgba(233,30,99,0.12)';
    ctx.shadowBlur = hover ? 16 : 8;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 12);
    ctx.fill();
    ctx.shadowBlur = 0;

    if (locked) {
      // Lock overlay
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.roundRect(bx, by, bw, bh, 12);
      ctx.fill();
    }

    // Accent bar
    ctx.fillStyle = locked ? '#ccc' : ['#f48fb1','#f06292','#ec407a','#e91e63'][i];
    ctx.beginPath();
    ctx.roundRect(bx, by, 6, bh, 3);
    ctx.fill();

    // Level icon
    ctx.font = '24px "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = locked ? '#bbb' : '#333';
    ctx.fillText(locked ? '\uD83D\uDD12' : `Lv.${i + 1}`, bx + 22, by + 24);

    ctx.font = '16px "Segoe UI", sans-serif';
    ctx.fillStyle = locked ? '#ccc' : '#555';
    ctx.fillText(locked ? 'Complete previous level to unlock' : lv.name, bx + 22, by + 50);

    // Difficulty hearts
    ctx.textAlign = 'right';
    for (let d = 0; d < 4; d++) {
      const hx = bx + bw - 18 - d * 22;
      const hy = by + 24;
      if (d < lv.difficulty) {
        drawHeart(hx, hy, 7, locked ? '#ddd' : '#e91e63');
      } else {
        drawHeart(hx, hy, 7, '#e0e0e0');
      }
    }

    ctx.textAlign = 'right';
    ctx.font = '12px "Segoe UI", sans-serif';
    ctx.fillStyle = locked ? '#ddd' : '#999';
    ctx.fillText(locked ? '\uD83D\uDD12' : lv.subtitle, bx + bw - 18, by + 50);

    ctx.textAlign = 'center';
    if (!locked) {
      ctx.buttons.push({ x: bx, y: by, w: bw, h: bh, action: 'level', level: i });
    }
  }

  // Back button
  const bbx = W / 2 - 50, bby = startY + 4 * gap + 10, bbw = 100, bbh = 36;
  const bHover = mouseX >= bbx && mouseX <= bbx + bbw && mouseY >= bby && mouseY <= bby + bbh;
  ctx.fillStyle = bHover ? 'rgba(233,30,99,0.15)' : 'rgba(233,30,99,0.08)';
  ctx.strokeStyle = 'rgba(233,30,99,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(bbx, bby, bbw, bbh, 18);
  ctx.fill();
  ctx.stroke();
  ctx.font = '15px "Segoe UI", sans-serif';
  ctx.fillStyle = '#ad1457';
  ctx.fillText('\u2190 Back', W / 2, bby + bbh / 2);
  ctx.buttons.push({ x: bbx, y: bby, w: bbw, h: bbh, action: 'menu' });

  ctx.restore();
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#fce4ec');
  grad.addColorStop(1, '#fff0f5');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 0.06;
  for (let i = 0; i < 15; i++) {
    const bx = ((i * 137 + 50) % W);
    const by = ((i * 97 + 30) % H);
    drawHeart(bx, by, 10 + (i % 15), '#e91e63');
  }
  ctx.globalAlpha = 1;
}

function drawGame() {
  drawBackground();
  for (const p of platforms) drawPlatform(p);
  drawCake(cake.x, cake.y);

  // Hearts
  for (const h of hearts) {
    if (h.collected) continue;
    const bob = Math.sin(Date.now() / 400 + h.bob * 3) * 3;
    const glow = Math.sin(Date.now() / 600 + h.bob) * 0.15 + 0.2;
    ctx.save();
    ctx.beginPath();
    ctx.arc(h.x, h.y + bob, 16, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(233, 30, 99, ${glow})`;
    ctx.fill();
    ctx.restore();
    drawHeart(h.x, h.y + bob, 12, '#e91e63');
  }

  // Broken hearts
  for (const b of brokenHearts) {
    if (!b.active) continue;
    const bob = Math.sin(Date.now() / 300 + b.x * 0.01) * 3;
    drawBrokenHeart(b.x, b.y + bob, 14);
  }

  // Particles
  for (const p of heartParticles) {
    ctx.globalAlpha = p.life;
    drawHeart(p.x, p.y, p.size, '#f06292');
    ctx.globalAlpha = 1;
  }

  // Paw prints
  for (const pp of pawPrints) {
    drawPawPrint(pp.x, pp.y, pp.size, pp.alpha);
  }

  // Text bubbles
  for (const tb of textBubbles) {
    ctx.save();
    ctx.globalAlpha = tb.life;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 16px "Segoe UI", sans-serif';
    ctx.fillStyle = '#e91e63';
    ctx.shadowColor = 'rgba(255,255,255,1)';
    ctx.shadowBlur = 4;
    ctx.fillText(tb.text, tb.x, tb.y);
    ctx.restore();
  }

  // Player
  const moving = Math.abs(player.vx) > 0.5;
  drawCat(player.x, player.y, player.w, player.h, player.facing, moving);

  // Confetti
  for (const c of confetti) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
    ctx.restore();
  }

  // HUD
  ctx.save();
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.font = 'bold 16px "Segoe UI", sans-serif';
  ctx.fillStyle = '#d81b60';
  ctx.shadowColor = 'rgba(255,255,255,0.8)';
  ctx.shadowBlur = 4;
  ctx.fillText('\uD83D\uDC97 ' + heartsCollected, 12, 10);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ad1457';
  ctx.font = '14px "Segoe UI", sans-serif';
  ctx.fillText('Lv.' + (currentLevel + 1) + ': ' + levels[currentLevel].name, W - 12, 10);
  ctx.shadowBlur = 0;

  if (frameCount < 180 && levels[currentLevel].hint) {
    ctx.textAlign = 'center';
    ctx.font = '13px "Segoe UI", sans-serif';
    ctx.fillStyle = '#d81b60';
    ctx.globalAlpha = Math.min(1, (180 - frameCount) / 60);
    ctx.fillText(levels[currentLevel].hint, W / 2, H - 30);
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // ESC hint
  ctx.save();
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.font = '11px "Segoe UI", sans-serif';
  ctx.fillStyle = 'rgba(173,20,87,0.4)';
  ctx.fillText('ESC = menu', W - 8, H - 6);
  ctx.restore();
}

function drawLevelComplete() {

  ctx.restore();
}

// Game update
function updateGame() {
  if (levelCompleted) return;

  let moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) moveX = -1;
  if (keys['ArrowRight'] || keys['KeyD']) moveX = 1;

  if (moveX !== 0) player.facing = moveX > 0 ? 1 : -1;

  if (moveX !== 0) {
    player.vx += moveX * MOVE_ACCEL;
    if (Math.abs(player.vx) > MAX_SPEED) player.vx = Math.sign(player.vx) * MAX_SPEED;
  } else {
    player.vx *= MOVE_FRICTION;
  }
  if (Math.abs(player.vx) < 0.05) player.vx = 0;

  player.x += player.vx;

  for (const p of platforms) {
    if (rectCollision(player, p)) {
      if (player.vx > 0) player.x = p.x - player.w;
      else if (player.vx < 0) player.x = p.x + p.w;
    }
  }

  player.vy += GRAVITY;
  player.y += player.vy;
  player.onGround = false;

  for (const p of platforms) {
    if (rectCollision(player, p)) {
      if (player.vy > 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  // Jump
  if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    spawnMeow(player.x + player.w / 2, player.y);
    playSFX('jump');
  }

  // Fall off screen
  if (player.y > H + 50) {
    playSFX('broken');
    restartLevel();
    return;
  }

  // Collect hearts
  for (const h of hearts) {
    if (h.collected) continue;
    const dx = (player.x + player.w / 2) - h.x;
    const dy = (player.y + player.h / 2) - h.y;
    if (Math.sqrt(dx * dx + dy * dy) < 28) {
      h.collected = true;
      heartsCollected++;
      spawnHeartParticles(h.x, h.y);
      playSFX('collect');
      spawnMeow(h.x, h.y - 10);
    }
  }

  // Broken hearts collision
  for (const b of brokenHearts) {
    if (!b.active) continue;
    const dx = (player.x + player.w / 2) - b.x;
    const dy = (player.y + player.h / 2) - b.y;
    if (Math.sqrt(dx * dx + dy * dy) < 24) {
      playSFX('broken');
      restartLevel();
      return;
    }
  }

  // Paw prints
  if (Math.abs(player.vx) > 0.5) {
    if (frameCount % 6 === 0) {
      pawPrints.push({
        x: player.x + player.w / 2 + (player.facing === -1 ? 8 : -8),
        y: player.y + player.h - 4,
        size: 5 + Math.random() * 2,
        alpha: 0.35,
        vx: 0,
        vy: 0,
      });
    }
  }

  // Win check
  if (rectCollision(player, cake)) {
    completeLevel();
  }

  updateParticles();
}

function updateParticles() {
  for (let i = heartParticles.length - 1; i >= 0; i--) {
    const p = heartParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.life -= 0.02;
    if (p.life <= 0) heartParticles.splice(i, 1);
  }
  // Paw prints
  for (let i = pawPrints.length - 1; i >= 0; i--) {
    const p = pawPrints[i];
    p.alpha -= 0.005;
    if (p.alpha <= 0) pawPrints.splice(i, 1);
  }
  // Text bubbles
  for (let i = textBubbles.length - 1; i >= 0; i--) {
    const tb = textBubbles[i];
    tb.y += tb.vy;
    tb.life -= 0.015;
    if (tb.life <= 0) textBubbles.splice(i, 1);
  }
}

// Sparkles init
function initSparkles() {
  sparkles = [];
  for (let i = 0; i < 20; i++) {
    sparkles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: 3 + Math.random() * 8,
      phase: Math.random() * Math.PI * 2,
      rot: Math.random() * Math.PI * 2,
      vy: -0.1 - Math.random() * 0.2,
    });
  }
}

function updateSparkles() {
  for (const s of sparkles) {
    s.y += s.vy;
    if (s.y < -20) { s.y = H + 20; s.x = Math.random() * W; }
  }
}

// Main draw dispatcher
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.buttons = [];

  if (gameState === STATE.MENU) {
    drawMenu();
  } else if (gameState === STATE.LEVEL_SELECT) {
    drawLevelSelect();
  } else if (gameState === STATE.PLAYING || gameState === STATE.LEVEL_COMPLETE) {
    drawGame();
    if (gameState === STATE.LEVEL_COMPLETE) drawLevelComplete();
  }
}

// Main update dispatcher
function update() {
  frameCount++;

  if (gameState === STATE.MENU) {
    updateSparkles();
  } else if (gameState === STATE.PLAYING) {
    updateGame();
  } else if (gameState === STATE.LEVEL_COMPLETE) {
    levelCompleteTimer--;
    for (let i = confetti.length - 1; i >= 0; i--) {
      const c = confetti[i];
      c.x += c.vx; c.y += c.vy;
      c.vy += 0.04;
      c.rot += c.rotSpeed;
      if (c.y > H + 20) confetti.splice(i, 1);
    }
    if (frameCount % 8 === 0) spawnConfetti(2);
    updateParticles();
    updateSparkles();

    if (levelCompleteTimer <= 0) {
      if (currentLevel < levels.length - 1) {
        currentLevel++;
        loadLevel(currentLevel);
        frameCount = 0;
      } else {
        allLevelsDone = true;
        showFinalOverlay();
      }
    }
  }
}

// Click handling
function handleClick(x, y) {
  mouseX = x;
  mouseY = y;

  if (gameState === STATE.MENU) {
    draw();
    for (const btn of ctx.buttons || []) {
      if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
        if (btn.action === 'play') goToLevelSelect();
        else if (btn.action === 'music') toggleMusic();
        else if (btn.action === 'slider') {
          const sl = btn.slider;
          if (sl) {
            const tx = sl.x + 80;
            const tw = 120;
            let val = (x - tx) / tw;
            val = Math.max(0, Math.min(1, val));
            sl.value = val;
            if (sl.key === 'musicVolume') {
              musicVolume = val;
              const audio = document.getElementById('bgm');
              if (audio) audio.volume = val;
              try { localStorage.setItem('eya_musicVol', String(val)); } catch (e) { /* ignore */ }
            } else if (sl.key === 'sfxVolume') {
              sfxVolume = val;
              try { localStorage.setItem('eya_sfxVol', String(val)); } catch (e) { /* ignore */ }
            }
          }
        }
        return;
      }
    }
  } else if (gameState === STATE.LEVEL_SELECT) {
    draw();
    for (const btn of ctx.buttons || []) {
      if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
        if (btn.action === 'level') {
          if (btn.level <= unlockedLevel) {
            currentLevel = btn.level;
            loadLevel(currentLevel);
            frameCount = 0;
            unlockAudio();
          }
        } else if (btn.action === 'menu') {
          goToMenu();
        }
        return;
      }
    }
  } else if (gameState === STATE.PLAYING || gameState === STATE.LEVEL_COMPLETE) {
    unlockAudio();
  }
}

function handleMove(x, y) {
  mouseX = x;
  mouseY = y;

  if (sliderDragging) {
    const sl = sliderDragging;
    const tx = sl.x + 80;
    const tw = 120;
    let val = (x - tx) / tw;
    val = Math.max(0, Math.min(1, val));
    sl.value = val;
    if (sl.key === 'musicVolume') {
      musicVolume = val;
      const audio = document.getElementById('bgm');
      if (audio) audio.volume = val;
    } else if (sl.key === 'sfxVolume') {
      sfxVolume = val;
    }
  }
}

// Input
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'Escape' && (gameState === STATE.PLAYING || gameState === STATE.LEVEL_COMPLETE)) {
    goToMenu();
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  handleMove(e.clientX - rect.left, e.clientY - rect.top);
});
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  // Check for slider drag
  if (gameState === STATE.MENU) {
    for (const btn of (ctx.buttons || [])) {
      if (btn.action === 'slider' && btn.slider) {
        const sl = btn.slider;
        const tx = sl.x + 80;
        const ty = sl.y + sl.h / 2;
        if (x >= tx - 10 && x <= tx + 130 && y >= ty - 15 && y <= ty + 15) {
          sliderDragging = sl;
          return;
        }
      }
    }
  }
});
canvas.addEventListener('mouseup', () => { sliderDragging = null; });
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  handleClick(e.clientX - rect.left, e.clientY - rect.top);
});

// Touch support for canvas
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.changedTouches[0];
  handleClick(touch.clientX - rect.left, touch.clientY - rect.top);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.changedTouches[0];
  handleMove(touch.clientX - rect.left, touch.clientY - rect.top);
  // Touch drag for sliders
  if (sliderDragging && gameState === STATE.MENU) {
    // handled by handleMove
  }
}, { passive: false });

canvas.addEventListener('touchend', () => { sliderDragging = null; });

// Keyboard also triggers game actions
document.addEventListener('keydown', e => {
  if (e.code === 'Enter' || e.code === 'Space') {
    if (gameState === STATE.MENU) { handleClick(W / 2, 253); }
    else if (gameState === STATE.LEVEL_SELECT) { e.preventDefault(); handleClick(W / 2, 150); }
  }
  if (e.code === 'KeyM') toggleMusic();
});

// Slideshow final overlay buttons
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('slide-prev').addEventListener('click', prevSlide);
  document.getElementById('slide-next').addEventListener('click', nextSlide);

  function playAgain() {
    document.getElementById('finalOverlay').classList.remove('show');
    if (slideTimer) clearInterval(slideTimer);
    currentLevel = 0;
    goToMenu();
  }

  document.getElementById('playAgainBtn').addEventListener('click', playAgain);
  document.getElementById('playAgainBtn2').addEventListener('click', playAgain);

  document.getElementById('viewPhotosBtn').addEventListener('click', () => {
    document.getElementById('couponContainer').style.display = 'none';
    document.getElementById('photosContainer').style.display = 'flex';
    resetSlideTimer();
  });
  document.getElementById('backToCouponBtn').addEventListener('click', () => {
    document.getElementById('photosContainer').style.display = 'none';
    document.getElementById('couponContainer').style.display = 'flex';
    if (slideTimer) clearInterval(slideTimer);
  });
});

// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (r > w / 2) r = w / 2;
    if (r > h / 2) r = h / 2;
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    return this;
  };
}

// Init
preloadSlideImages();
loadProgress();

// Load volume settings
try {
  const mv = parseFloat(localStorage.getItem('eya_musicVol'));
  if (mv >= 0 && mv <= 1) musicVolume = mv;
  const sv = parseFloat(localStorage.getItem('eya_sfxVol'));
  if (sv >= 0 && sv <= 1) sfxVolume = sv;
} catch (e) { /* ignore */ }

initSparkles();

// Apply music volume to audio element
const audioEl = document.getElementById('bgm');
if (audioEl) audioEl.volume = musicVolume;

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
